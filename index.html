    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { height: 100%; overflow: hidden; }
      body { height: 100%; background: #070d1a; color: #e2e8f0; font-family: -apple-system, 'Inter', 'SF Pro Text', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overscroll-behavior: none; font-size: 14px; line-height: 1.5; }
      #root { height: 100%; display: flex; flex-direction: column; }
      input, select, textarea, button { font-family: inherit; }
      button { user-select: none; -webkit-tap-highlight-color: transparent; }
    </style>
    <!-- Google Identity Services — needed for Sign-In + Calendar OAuth -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      // Unregister stale service workers on every load
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
    </script>

    </div>
    <style>@keyframes pulse{from{transform:translateX(-100%)}to{transform:translateX(300%)}}</style>
  </div>
</div>
