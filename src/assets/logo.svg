<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="#08090d"/>

  <!-- Outer glow rings -->
  <circle cx="512" cy="512" r="400" fill="none" stroke="url(#ring1)" stroke-width="1.5" opacity="0.3"/>
  <circle cx="512" cy="512" r="340" fill="none" stroke="url(#ring2)" stroke-width="1" opacity="0.2"/>

  <!-- Main card shape -->
  <rect x="188" y="220" width="648" height="584" rx="56" fill="url(#cardGrad)"/>
  <rect x="188" y="220" width="648" height="584" rx="56" stroke="url(#cardBorder)" stroke-width="2"/>

  <!-- Calendar header bar -->
  <rect x="188" y="220" width="648" height="148" rx="56" fill="url(#headerGrad)"/>
  <rect x="188" y="292" width="648" height="76" fill="url(#headerGrad)"/>

  <!-- Calendar binding dots -->
  <circle cx="340" cy="196" r="22" fill="#1a1d2e" stroke="#6366f1" stroke-width="3"/>
  <circle cx="512" cy="196" r="22" fill="#1a1d2e" stroke="#8b5cf6" stroke-width="3"/>
  <circle cx="684" cy="196" r="22" fill="#1a1d2e" stroke="#6366f1" stroke-width="3"/>
  <!-- Binding stems -->
  <rect x="328" y="196" width="24" height="60" rx="4" fill="#1a1d2e" stroke="#6366f1" stroke-width="2"/>
  <rect x="500" y="196" width="24" height="60" rx="4" fill="#1a1d2e" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="672" y="196" width="24" height="60" rx="4" fill="#1a1d2e" stroke="#6366f1" stroke-width="2"/>

  <!-- Month label area -->
  <text x="512" y="332" font-family="-apple-system, 'SF Pro Display', 'Inter', sans-serif" font-weight="800" font-size="52" fill="white" text-anchor="middle" letter-spacing="-1">PLANNER</text>

  <!-- Grid lines -->
  <line x1="188" y1="420" x2="836" y2="420" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
  <line x1="188" y1="508" x2="836" y2="508" stroke="rgba(99,102,241,0.1)" stroke-width="1"/>
  <line x1="188" y1="596" x2="836" y2="596" stroke="rgba(99,102,241,0.1)" stroke-width="1"/>
  <line x1="188" y1="684" x2="836" y2="684" stroke="rgba(99,102,241,0.1)" stroke-width="1"/>

  <!-- Vertical grid -->
  <line x1="280" y1="368" x2="280" y2="804" stroke="rgba(99,102,241,0.08)" stroke-width="1"/>
  <line x1="372" y1="368" x2="372" y2="804" stroke="rgba(99,102,241,0.08)" stroke-width="1"/>
  <line x1="464" y1="368" x2="464" y2="804" stroke="rgba(99,102,241,0.08)" stroke-width="1"/>
  <line x1="556" y1="368" x2="556" y2="804" stroke="rgba(99,102,241,0.08)" stroke-width="1"/>
  <line x1="648" y1="368" x2="648" y2="804" stroke="rgba(99,102,241,0.08)" stroke-width="1"/>
  <line x1="740" y1="368" x2="740" y2="804" stroke="rgba(99,102,241,0.08)" stroke-width="1"/>

  <!-- Calendar entries — colorful task bars -->
  <!-- Row 1 -->
  <rect x="210" y="430" width="220" height="52" rx="10" fill="url(#bar1)"/>
  <rect x="448" y="430" width="160" height="52" rx="10" fill="url(#bar2)"/>
  <rect x="626" y="430" width="188" height="52" rx="10" fill="url(#bar3)"/>

  <!-- Row 2 — with checkmark -->
  <rect x="210" y="518" width="140" height="52" rx="10" fill="rgba(52,201,138,0.18)" stroke="rgba(52,201,138,0.35)" stroke-width="1.5"/>
  <!-- Checkmark inside -->
  <path d="M240 544 L258 562 L292 528" stroke="#34c98a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="368" y="518" width="280" height="52" rx="10" fill="url(#bar4)"/>
  <rect x="666" y="518" width="148" height="52" rx="10" fill="rgba(251,191,36,0.15)" stroke="rgba(251,191,36,0.3)" stroke-width="1.5"/>

  <!-- Row 3 -->
  <rect x="210" y="606" width="180" height="52" rx="10" fill="url(#bar5)"/>
  <rect x="408" y="606" width="240" height="52" rx="10" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1.5"/>
  <rect x="666" y="606" width="148" height="52" rx="10" fill="url(#bar6)"/>

  <!-- Row 4 -->
  <rect x="210" y="694" width="300" height="52" rx="10" fill="url(#bar7)"/>
  <rect x="528" y="694" width="286" height="52" rx="10" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1.5"/>

  <!-- UP monogram overlay — bottom right corner glow -->
  <circle cx="780" cy="780" r="90" fill="url(#monogramBg)" opacity="0.9"/>
  <text x="780" y="808" font-family="-apple-system, 'SF Pro Display', 'Inter', sans-serif" font-weight="900" font-size="72" fill="white" text-anchor="middle" letter-spacing="-3">UP</text>

  <!-- Gradient definitions -->
  <defs>
    <radialGradient id="ring1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </radialGradient>
    <radialGradient id="ring2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#080c14"/>
    </linearGradient>
    <linearGradient id="cardBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(99,102,241,0.4)"/>
      <stop offset="50%" stop-color="rgba(139,92,246,0.2)"/>
      <stop offset="100%" stop-color="rgba(99,102,241,0.1)"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#1a1d3a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="bar5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34c98a"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="bar6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="bar7" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="monogramBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.05"/>
    </radialGradient>
  </defs>
</svg>
